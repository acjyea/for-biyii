<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&display=swap" rel="stylesheet">

<title>for biyi 🤍</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/geometries/TextGeometry.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

    <div id="rotateOverlay">

    <div class="rotateBox">

        <div class="phoneIcon">🔄</div>

        <h2>please rotate your phone</h2>

        <p>
            put your phone in landscape mode
            for the best experience.
        </p>

    </div>

</div>

    <!-- Loading -->
    <section id="loading-screen">
        <div class="loader"></div>
        <p>Loading...</p>
    </section>

    <!-- Envelope -->
    <section id="envelope-screen" class="hidden">

        <div class="envelope" id="envelope">

            <div class="envelope-top"></div>

            <div class="letter">
                💝
            </div>

        </div>

        <h2>open</h2>

    </section>

    <!-- Letter -->
    <section id="letter-screen" class="hidden">

        <div class="letter-box">

            <h1>for biyi🤍</h1>

            <p id="typing"></p>

            <button id="nextBtn">
                next →
            </button>

        </div>

    </section>

    <!-- Gallery -->
    <section id="gallery-screen" class="hidden">

    <h2 class="gallery-title">
        ⚠️WARNING
    </h2>

    <p class="gallery-subtitle">
        ( di bawah ini terdapat wajah orang tergantenk di dunia jagat raya alam semesta)
    </p>

    <div class="gallery" id="gallery">

    </div>

    <button id="galaxyBtn">
        ready?
    </button>

</section>

    <!-- Galaxy -->
    <section id="galaxy-screen" class="hidden">

        <canvas id="galaxyCanvas"></canvas>

        <!-- ================= MOBILE CONTROL ================= -->

<div id="mobileControls">

    <div id="joystickArea">

        <div id="joystickBase">

            <div id="joystickStick"></div>

        </div>

    </div>

    <div id="rightControls">

        <button id="upBtn">▲</button>

        <button id="downBtn">▼</button>

    </div>

</div>

    </section>
    
    <!-- Music -->
    <audio id="bgMusic" loop>

        <source
            src="assets/audio/about-you.mp3"
            type="audio/mpeg">

    </audio>

    <script src="js/camera.js"></script>
    <script src="js/galaxy.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
